  one_line_finding: Mental health must be reframed through a human rights lens, moving beyond the biomedical model to uphold legal capacity, informed consent, and social inclusion as core components of equitable care.
- id: 2008 - Lepping - Is psychiatry torn in different ethical directions
  title: Is psychiatry torn in different ethical directions
  authors:
  - Lepping
  year: 2008
  pdf_path: Human rights, Coercive Treatment/2008 - Lepping - Is psychiatry torn in different ethical directions.pdf
  source_type: pdf
  wiki_slug: 2008 - Lepping - Is psychiatry torn in different ethical directions
  summary_path: sources/2008 - Lepping - Is psychiatry torn in different ethical directions.md
  llm_keywords:
  - mental health law
  - ethical conflict
  - utilitarianism
  - rights-based ethics
  - capacity assessment
  - deprivation of liberty safeguards
  - community treatment orders
  - mental illness stigma
  - social policing role
  - legislative inconsistency
  one_line_finding: Psychiatry is uniquely ethically conflicted because it operates under legislation that is predominantly utilitarian (Mental Health Act 2007), while other relevant laws (Human Rights Act 1998, Mental Capacity Act 2005) are rights-focused, creating a split not seen in other medical specialties.
