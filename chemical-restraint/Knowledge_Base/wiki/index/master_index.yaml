- id: 1980 - Brooks - The constitutional right to refuse antipsychotic medications.
  title: The constitutional right to refuse antipsychotic medications.
  authors:
  - Brooks
  year: 1980
  pdf_path: Human rights, Coercive Treatment/1980 - Brooks - The constitutional right to refuse antipsychotic medications..pdf
  source_type: pdf
  wiki_slug: 1980 - Brooks - The constitutional right to refuse antipsychotic medications.
  summary_path: sources/1980 - Brooks - The constitutional right to refuse antipsychotic medications..md
  llm_keywords:
  - constitutional right to privacy
  - informed consent
  - competence
  - parens patriae
  - police power
  - therapeutic alliance
  - involuntary commitment
  - side effect burden
  - tardive dyskinesia
  - therapeutic misconception
  one_line_finding: Involuntarily hospitalized mental patients possess a qualified constitutional right to refuse antipsychotic medication based on privacy rights, overridable only upon findings of incompetence or dangerousness.
